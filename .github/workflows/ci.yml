name: CI

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, synchronize, reopened, labeled, unlabeled, closed]

permissions:
    contents: read

env:
    # app
    APP_PORT: 3000
    APP_ENV: 'development'
    APP_URL: 'localhost'
    APP_ADMIN_EMAIL: 'deeznutz@gmail.com'
    APP_SECRET_SALT: 'bang'
    APP_API_KEY_SECRET: 'bang'

    # session
    SESSION_STORE_PREFIX: 'deez'
    SESSION_SECRET: 'nutz'
    SESSION_DOMAIN: 'localhost' # needs to be domain.com without http or https

    # email
    EMAIL_HOST: mailpit
    EMAIL_PORT: 1025
    EMAIL_SECURE: false
    EMAIL_USER:
    EMAIL_PASSWORD:
    EMAIL_FROM: noreply@bang.local

    # ntfy
    NTFY_URL: 'https://ntfy.example.test'
    NTFY_TOPIC: 'bang'
    NTFY_TOKEN: ''

    # cloudflare
    CLOUDFLARE_TURNSTILE_SITE_KEY: 'deeznutz'
    CLOUDFLARE_TURNSTILE_SECRET_KEY: 'joemama'

concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    unit-test:
        name: Unit tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 1
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Create .env file from .env.ci
              run: cp .env.ci .env

            - name: Install dependencies
              run: npm ci

            - name: Rebuild native modules
              run: npm rebuild better-sqlite3 bcrypt esbuild --ignore-scripts=false

            - name: Verify package signatures
              run: npm audit signatures

            - name: Migrate dev database
              run: npm run db:prepare:dev

            - name: Test codes
              run: npm run test:coverage

    browser-test:
        name: Browser tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 1
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Create .env file from .env.ci
              run: cp .env.ci .env

            - name: Install dependencies
              run: npm ci

            - name: Rebuild native modules
              run: npm rebuild better-sqlite3 bcrypt esbuild --ignore-scripts=false

            - name: Cache Playwright browsers
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              id: playwright-cache
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium
              timeout-minutes: 10

            - name: Install Playwright deps only
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: npx playwright install-deps chromium
              timeout-minutes: 5

            - name: Migrate dev database
              run: npm run db:prepare:dev

            - name: Run browser tests
              run: npm run test:browser:headless

            - name: Upload test results
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: failure()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 1
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Rebuild native modules
              run: npm rebuild better-sqlite3 bcrypt esbuild --ignore-scripts=false

            - name: Lint codes
              run: npm run lint

    format:
        name: Format
        runs-on: ubuntu-latest

        permissions:
            contents: write
            actions: write

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 1
            - name: Use Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Rebuild native modules
              run: npm rebuild better-sqlite3 bcrypt esbuild --ignore-scripts=false

            - name: Format codes
              run: npm run format

            - name: Commit changes
              uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
              with:
                  commit_message: 'style: format codes'
                  file_pattern: '!.github/workflows/*.yml !.github/workflows/*.yaml'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
        name: Build
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        outputs:
            tag: ${{ steps.image-name.outputs.TAG }}
        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 1
                  persist-credentials: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Login to Container Registry
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GH_TOKEN }}

            - name: Generate Image Name
              id: image-name
              run: |
                  TAG=$(echo ${{ github.sha }} | cut -c1-7)
                  IMAGE_URL=$(echo ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$TAG | tr '[:upper:]' '[:lower:]')
                  echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_OUTPUT
                  echo "TAG=$TAG" >> $GITHUB_OUTPUT

            - name: Build and push Docker Image
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: ${{ steps.image-name.outputs.IMAGE_URL }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: false
                  sbom: false

    deploy:
        if: github.event_name == 'push'
        needs: [lint, unit-test, browser-test, format, build]
        name: Deploy
        uses: wajeht/docker-cd-deploy-workflow/.github/workflows/deploy.yaml@ed0bda2409dae9b929fafb7327b199e34ae83b27 # v0.0.25
        with:
            app-path: apps/bang
            service-name: bang
            tag: ${{ needs.build.outputs.tag }}
        secrets:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}

    temp-build:
        name: Temp Build
        if: >
            (github.event.action == 'labeled' &&
            (github.event.label.name == 'temp-deploy' ||
            github.event.label.name == 'temp-deploy-with-auth')) ||
            (github.event.action == 'synchronize' &&
            (contains(github.event.pull_request.labels.*.name, 'temp-deploy') ||
            contains(github.event.pull_request.labels.*.name, 'temp-deploy-with-auth')))
        runs-on: ubuntu-latest
        permissions:
            packages: write
        outputs:
            tag: ${{ steps.image-name.outputs.TAG }}
        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 1
                  persist-credentials: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Login to Container Registry
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GH_TOKEN }}

            - name: Generate Image Name
              id: image-name
              run: |
                  TAG=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)
                  IMAGE_URL=$(echo ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$TAG | tr '[:upper:]' '[:lower:]')
                  echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_OUTPUT
                  echo "TAG=$TAG" >> $GITHUB_OUTPUT

            - name: Build and push Docker Image
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: ${{ steps.image-name.outputs.IMAGE_URL }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: false
                  sbom: false

    temp-deploy:
        name: Temp Deploy
        if: >
            (github.event.action == 'labeled' &&
            (github.event.label.name == 'temp-deploy' ||
            github.event.label.name == 'temp-deploy-with-auth')) ||
            (github.event.action == 'synchronize' &&
            (contains(github.event.pull_request.labels.*.name, 'temp-deploy') ||
            contains(github.event.pull_request.labels.*.name, 'temp-deploy-with-auth')))
        needs: temp-build
        permissions:
            deployments: write
        uses: wajeht/docker-cd-deploy-workflow/.github/workflows/temp-deploy.yaml@ed0bda2409dae9b929fafb7327b199e34ae83b27 # v0.0.25
        with:
            app-path: apps/bang
            service-name: bang
            tag: ${{ needs.temp-build.outputs.tag }}
            # The temp-deploy-with-auth label protects the temp site with Traefik auth; the
            # plain temp-deploy label keeps the production middleware (no auth).
            auth-middleware: ${{ contains(github.event.pull_request.labels.*.name, 'temp-deploy-with-auth') && 'oauth2-admin@file' || '' }}
        secrets:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}

    temp-cleanup:
        name: Temp Cleanup
        if: >
            github.event.action == 'closed' ||
            (github.event.action == 'unlabeled' &&
            (github.event.label.name == 'temp-deploy' ||
            github.event.label.name == 'temp-deploy-with-auth') &&
            !contains(github.event.pull_request.labels.*.name, 'temp-deploy') &&
            !contains(github.event.pull_request.labels.*.name, 'temp-deploy-with-auth'))
        permissions:
            deployments: write
        uses: wajeht/docker-cd-deploy-workflow/.github/workflows/temp-cleanup.yaml@ed0bda2409dae9b929fafb7327b199e34ae83b27 # v0.0.25
        with:
            app-path: apps/bang
        secrets:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}
