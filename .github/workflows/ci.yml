name: CI

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, synchronize, reopened, labeled, unlabeled, closed]

permissions:
    contents: read

env:
    # app
    APP_PORT: 3000
    APP_ENV: 'development'
    APP_URL: 'localhost'
    APP_ADMIN_EMAIL: 'deeznutz@gmail.com'
    APP_SECRET_SALT: 'bang'
    APP_API_KEY_SECRET: 'bang'

    # session
    SESSION_STORE_PREFIX: 'deez'
    SESSION_SECRET: 'nutz'
    SESSION_DOMAIN: 'localhost' # needs to be domain.com without http or https

    # email
    EMAIL_HOST: mailpit
    EMAIL_PORT: 1025
    EMAIL_SECURE: false
    EMAIL_USER:
    EMAIL_PASSWORD:
    EMAIL_FROM: noreply@bang.local

    # ntfy
    NTFY_URL: 'https://ntfy.example.test'
    NTFY_TOPIC: 'bang'
    NTFY_TOKEN: ''

    # cap (self-hosted captcha)
    CAP_SITE_KEY: 'deeznutz'
    CAP_SECRET: 'joemama'
    CAP_API_URL: 'https://cap.example.test'

concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    unit-test:
        name: Unit tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  fetch-depth: 1
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Create .env file from .env.ci
              run: cp .env.ci .env

            - name: Install dependencies
              run: npm ci

            - name: Rebuild native modules
              run: npm rebuild better-sqlite3 bcrypt esbuild --ignore-scripts=false

            - name: Verify package signatures
              run: npm audit signatures

            - name: Migrate dev database
              run: node --run db:prepare:dev

            - name: Test codes
              run: node --run test:coverage

    browser-test:
        name: Browser tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  fetch-depth: 1
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Create .env file from .env.ci
              run: cp .env.ci .env

            - name: Install dependencies
              run: npm ci

            - name: Rebuild native modules
              run: npm rebuild better-sqlite3 bcrypt esbuild --ignore-scripts=false

            - name: Cache Playwright browsers
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              id: playwright-cache
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: node ./node_modules/playwright/cli.js install --with-deps chromium
              timeout-minutes: 10

            - name: Install Playwright deps only
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: node ./node_modules/playwright/cli.js install-deps chromium
              timeout-minutes: 5

            - name: Migrate dev database
              run: node --run db:prepare:dev

            - name: Run browser tests
              run: node --run test:browser:headless

            - name: Upload test results
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: failure()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  fetch-depth: 1
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Rebuild native modules
              run: npm rebuild better-sqlite3 bcrypt esbuild --ignore-scripts=false

            - name: Lint codes
              run: node --run lint

    format:
        name: Format
        runs-on: ubuntu-latest

        permissions:
            contents: write
            actions: write

        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  fetch-depth: 1
            - name: Use Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Rebuild native modules
              run: npm rebuild better-sqlite3 bcrypt esbuild --ignore-scripts=false

            - name: Format codes
              run: node --run format

            - name: Commit changes
              uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
              with:
                  commit_message: 'style: format codes'
                  file_pattern: '!.github/workflows/*.yml !.github/workflows/*.yaml'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
        name: Build
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        outputs:
            tag: ${{ steps.image-name.outputs.TAG }}
        steps:
            - name: Check out repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  fetch-depth: 1
                  persist-credentials: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

            - name: Login to Container Registry
              uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GH_TOKEN }}

            - name: Generate Image Name
              id: image-name
              run: |
                  TAG=$(echo ${{ github.sha }} | cut -c1-7)
                  IMAGE_URL=$(echo ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$TAG | tr '[:upper:]' '[:lower:]')
                  echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_OUTPUT
                  echo "TAG=$TAG" >> $GITHUB_OUTPUT

            - name: Build and push Docker Image
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: ${{ steps.image-name.outputs.IMAGE_URL }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: false
                  sbom: false

    deploy:
        if: github.event_name == 'push'
        needs: [lint, unit-test, browser-test, format, build]
        name: Deploy
        uses: wajeht/docker-cd-deploy-workflow/.github/workflows/deploy.yaml@970a4d7bd568e096d091fbec3371019c763def1f # v0.0.26
        with:
            app-path: apps/bang
            service-name: bang
            tag: ${{ needs.build.outputs.tag }}
        secrets:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}

    temp-build:
        name: Temp Build
        if: >
            (github.event.action == 'labeled' &&
            (github.event.label.name == 'temp-deploy' ||
            github.event.label.name == 'temp-deploy-with-auth')) ||
            (github.event.action == 'synchronize' &&
            (contains(github.event.pull_request.labels.*.name, 'temp-deploy') ||
            contains(github.event.pull_request.labels.*.name, 'temp-deploy-with-auth')))
        runs-on: ubuntu-latest
        permissions:
            packages: write
        outputs:
            tag: ${{ steps.image-name.outputs.TAG }}
        steps:
            - name: Check out repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  fetch-depth: 1
                  persist-credentials: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

            - name: Login to Container Registry
              uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GH_TOKEN }}

            - name: Generate Image Name
              id: image-name
              run: |
                  TAG=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)
                  IMAGE_URL=$(echo ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$TAG | tr '[:upper:]' '[:lower:]')
                  echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_OUTPUT
                  echo "TAG=$TAG" >> $GITHUB_OUTPUT

            - name: Build and push Docker Image
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: ${{ steps.image-name.outputs.IMAGE_URL }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: false
                  sbom: false

    temp-deploy:
        name: Temp Deploy
        if: >
            (github.event.action == 'labeled' &&
            (github.event.label.name == 'temp-deploy' ||
            github.event.label.name == 'temp-deploy-with-auth')) ||
            (github.event.action == 'synchronize' &&
            (contains(github.event.pull_request.labels.*.name, 'temp-deploy') ||
            contains(github.event.pull_request.labels.*.name, 'temp-deploy-with-auth')))
        needs: temp-build
        permissions:
            deployments: write
        uses: wajeht/docker-cd-deploy-workflow/.github/workflows/temp-deploy.yaml@970a4d7bd568e096d091fbec3371019c763def1f # v0.0.26
        with:
            app-path: apps/bang
            service-name: bang
            tag: ${{ needs.temp-build.outputs.tag }}
            auth-middleware: ${{ contains(github.event.pull_request.labels.*.name, 'temp-deploy-with-auth') && 'oauth2-admin@file' || '' }}
        secrets:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}

    temp-cleanup:
        name: Temp Cleanup
        if: >
            github.event.action == 'closed' ||
            (github.event.action == 'unlabeled' &&
            (github.event.label.name == 'temp-deploy' ||
            github.event.label.name == 'temp-deploy-with-auth') &&
            !contains(github.event.pull_request.labels.*.name, 'temp-deploy') &&
            !contains(github.event.pull_request.labels.*.name, 'temp-deploy-with-auth'))
        permissions:
            deployments: write
        uses: wajeht/docker-cd-deploy-workflow/.github/workflows/temp-cleanup.yaml@970a4d7bd568e096d091fbec3371019c763def1f # v0.0.26
        with:
            app-path: apps/bang
        secrets:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}
