name: Update Bangs

# on:
#     schedule:
#         # Run every day at 12 PM UTC to update bangs
#         - cron: '0 12 * * *'
#     workflow_dispatch: # Allow manual triggering

on:
    schedule:
        # Run every Saturday at 12 PM UTC
        - cron: '0 12 * * 6'
    workflow_dispatch: # Allow manual triggering

jobs:
    update-bangs:
        name: Update bangs from Kagi and DuckDuckGo
        runs-on: ubuntu-latest

        permissions:
            contents: write
            pull-requests: write

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Rebuild native modules
              run: npm rebuild better-sqlite3 bcrypt esbuild --ignore-scripts=false

            - name: Update bangs from multiple sources
              run: npm run build:bang

            - name: Format updated bangs
              run: npm run format

            - name: Create Pull Request
              id: cpr
              uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
              with:
                  token: ${{ secrets.GH_TOKEN }}
                  commit-message: 'feat: update bangs data from Kagi and DuckDuckGo'
                  title: 'feat: update bangs data from Kagi and DuckDuckGo'
                  body: |
                      Automated weekly update of bangs data from Kagi and DuckDuckGo.
                  branch: bot/update-bangs
                  delete-branch: true
                  add-paths: src/db/bang.ts

            - name: Enable auto-merge
              if: steps.cpr.outputs.pull-request-number
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
              run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
