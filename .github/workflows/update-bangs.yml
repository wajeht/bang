name: Update Bangs

# on:
#     schedule:
#         # Run every day at 12 PM UTC to update bangs
#         - cron: '0 12 * * *'
#     workflow_dispatch: # Allow manual triggering

on:
    schedule:
        # Run every Saturday at 12 PM UTC
        - cron: '0 12 * * 6'
    workflow_dispatch: # Allow manual triggering

jobs:
    update-bangs:
        name: Update bangs from Kagi and DuckDuckGo
        runs-on: ubuntu-latest

        permissions:
            contents: write
            pull-requests: write

        strategy:
            matrix:
                node-version: [25.x]

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm i

            - name: Update bangs from multiple sources
              run: npm run build:bang

            - name: Format updated bangs
              run: npm run format

            - name: Create Pull Request
              id: cpr
              uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.GH_TOKEN }}
                  commit-message: 'feat: update bangs data from Kagi and DuckDuckGo'
                  title: 'feat: update bangs data from Kagi and DuckDuckGo'
                  body: |
                      Automated weekly update of bangs data from Kagi and DuckDuckGo.
                  branch: bot/update-bangs
                  delete-branch: true
                  add-paths: src/db/bang.ts

            - name: Enable auto-merge
              if: steps.cpr.outputs.pull-request-number
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
              run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
