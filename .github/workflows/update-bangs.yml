name: Update Bangs

# on:
#     schedule:
#         # Run every day at 12 PM UTC to update bangs
#         - cron: '0 12 * * *'
#     workflow_dispatch: # Allow manual triggering

on:
    schedule:
        # Run every Saturday at 12 PM UTC
        - cron: '0 12 * * 6'
    workflow_dispatch: # Allow manual triggering

jobs:
    update-bangs:
        name: Update bangs from Kagi and DuckDuckGo
        runs-on: ubuntu-latest
        outputs:
            changed: ${{ steps.verify-changed-files.outputs.changed }}

        permissions:
            contents: write

        strategy:
            matrix:
                node-version: [25.x]

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm i

            - name: Update bangs from multiple sources
              run: npm run build:bang

            - name: Format updated bangs
              run: npm run format

            - name: Check for changes
              id: verify-changed-files
              run: |
                  if [ -n "$(git status --porcelain)" ]; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "Files have been modified:"
                    git diff --name-only
                    echo "Diff summary:"
                    git diff --stat
                  else
                    echo "changed=false" >> $GITHUB_OUTPUT
                    echo "No files were modified."
                  fi

            - name: Commit updated bangs
              if: steps.verify-changed-files.outputs.changed == 'true'
              uses: stefanzweifel/git-auto-commit-action@3ea6ae190baf489ba007f7c92608f33ce20ef04a # v4.16.0
              with:
                  commit_message: 'feat: update bangs data from Kagi and DuckDuckGo'
                  file_pattern: 'src/db/bang.ts'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
        needs: [update-bangs]
        name: Build
        runs-on: ubuntu-latest
        if: needs.update-bangs.outputs.changed == 'true'
        outputs:
            tag: ${{ steps.image-name.outputs.TAG }}

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  fetch-depth: 1

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

            - name: Login to Container Registry
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GH_TOKEN }}

            - name: Generate Image Name
              id: image-name
              run: |
                  TAG=$(echo ${{ github.sha }} | cut -c1-7)
                  IMAGE_URL=$(echo ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$TAG | tr '[:upper:]' '[:lower:]')
                  echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_OUTPUT
                  echo "TAG=$TAG" >> $GITHUB_OUTPUT

            - name: Build and push Docker Image
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: ${{ steps.image-name.outputs.IMAGE_URL }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: false
                  sbom: false

    deploy:
        needs: [build]
        name: Deploy
        uses: wajeht/docker-cd-deploy-workflow/.github/workflows/deploy.yaml@c976aac4e51a559837963f7d903600c2c436e589 # v0.0.20
        with:
            app-path: apps/bang
            tag: ${{ needs.build.outputs.tag }}
        secrets:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}
