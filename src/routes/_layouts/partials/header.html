<header style="flex: 0; display: flex; flex-direction: column; gap: 20px; border-bottom: solid 1px var(--card-border-color); padding-bottom: 15px;">
  <nav style="display: flex; justify-content: space-between; align-items: center;" aria-label="Main navigation">
      <div style="display: flex; align-items: center; gap: 20px; justify-items: center;">
          <h1 style="padding-right: 10px;"><a href="/">⚡️ <%= state.branding.appName %></a></h1>
          <ul style="list-style: none; padding: 0; margin: 0; display: flex; gap: 40px;">
            <li>
              <a style="font-weight: <%= path === '/actions' ? 'bold' : 'normal' %>; <%= path === '/actions' ? 'text-decoration: underline;' : '' %>" href="/actions" <%= path === '/actions' ? 'aria-current="page"' : '' %>>🚀 Actions</a>
            </li>
            <li>
              <a style="font-weight: <%= path === '/bookmarks' ? 'bold' : 'normal' %>; <%= path === '/bookmarks' ? 'text-decoration: underline;' : '' %>" href="/bookmarks" <%= path === '/bookmarks' ? 'aria-current="page"' : '' %>>⭐️ Bookmarks</a>
            </li>
              <li>
              <a style="font-weight: <%= path === '/reminders' ? 'bold' : 'normal' %>; <%= path === '/reminders' ? 'text-decoration: underline;' : '' %>" href="/reminders" <%= path === '/reminders' ? 'aria-current="page"' : '' %>>⏰ Reminders</a>
            </li>
            <li>
              <a style="font-weight: <%= path === '/tabs' ? 'bold' : 'normal' %>; <%= path === '/tabs' ? 'text-decoration: underline;' : '' %>" href="/tabs" <%= path === '/tabs' ? 'aria-current="page"' : '' %>>🔗 Tabs</a>
            </li>
              <li>
              <a style="font-weight: <%= path === '/notes' ? 'bold' : 'normal' %>; <%= path === '/notes' ? 'text-decoration: underline;' : '' %>" href="/notes" <%= path === '/notes' ? 'aria-current="page"' : '' %>>📝 Notes</a>
            </li>
          </ul>
      </div>

      <details style="position: relative;">
          <summary aria-label="User menu for <%= state.user.username %>"><%= state.user.username %> 👤</summary>
          <div style="position: absolute; top: 100%; right: 0; z-index: 1001; border: solid 1px var(--summary-content-border-color); display: flex; flex-direction: column; padding: 10px; background-color: var(--background-color); border-radius: 4px; min-width: 150px; gap: 10px;" role="menu">
              <% if (state.user.is_admin) { %>
                <a href="/admin" style="font-weight: <%= path === '/admin' ? 'bold' : 'normal' %>; <%= path === '/admin' ? 'text-decoration: underline;' : '' %>" role="menuitem" <%= path === '/admin' ? 'aria-current="page"' : '' %>><span style="display: inline-block; width: 1.5em; text-align: center;">👑</span> Admin</a>
              <% } %>
              <a href="/settings" style="font-weight: <%= path.match(/^\/settings/) ? 'bold' : 'normal' %>; <%= path.match(/^\/settings/) ? 'text-decoration: underline;' : '' %>" role="menuitem" <%= path.match(/^\/settings/) ? 'aria-current="page"' : '' %>><span style="display: inline-block; width: 1.5em; text-align: center;">⚙️</span> Settings</a>
              <a href="/api-docs" style="font-weight: <%= path.match(/^\/api-docs/) ? 'bold' : 'normal' %>; <%= path.match(/^\/api-docs/) ? 'text-decoration: underline;' : '' %>" role="menuitem" <%= path.match(/^\/api-docs/) ? 'aria-current="page"' : '' %>><span style="display: inline-block; width: 1.5em; text-align: center;">📃</span> API Docs</a>
              <hr style="border: none; border-top: solid 1px var(--link-divider-color); margin: 5px 0;" role="separator">
              <a href="/logout" role="menuitem"><span style="display: inline-block; width: 1.5em; text-align: center;">🚪</span> Logout</a>
          </div>
      </details>
  </nav>
</header>
